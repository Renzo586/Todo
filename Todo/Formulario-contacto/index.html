<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario</title>
</head>
<header>
    <H1>Formulario de contacto</H1>
</header>
<body>
    <main>
     <form action="/enviar" method="POST">

        <label for="nombre">
                   Nombre:
                  <input type="text" id="nombre" name="nombre" required />
        </label>

        <label for="Email">
                    Email:
                   <input type="email" id="Email" name="email" required />
        </label>

        <label for="Edad">
                     Edad
                    <input type="text" id="Edad" name="Edad" required />
        </label>
        
        <label for="Tenes empleo">
            Tenes empleo
                    <input type="checkbox" id="Tenes empleo" name="Empleo" required />
        </label>
        <br>
        <br>

        <label for="Experiencia">
                Experiencia con html 
                    <input type="checkbox" id="Experiencia" name="Experiencia con html" required />
        </label>

         <label for="Experiencia2">
                Experiencia con CSS
                    <input type="checkbox" id="Experiencia2" name="Experiencia con css" required />
        </label>

        <label for="Experiencia3">
            Experiencia con Javascript
                    <input type="checkbox" id="Experiencia3" name="Experiencia con Javascript" required />
        </label>

        <label for="Experiencia4">
            Experencia con git
                    <input type="checkbox" id="Experiencia" name="Experiencia con git" required />
        </label>

     </form>
    </main>
    
</body>
</html>
